# RapidMuskingum example configuration
# Use with: rr.RapidMuskingum('config.yaml').route()

# ---------------------------------------------------------------------------
# Required
# ---------------------------------------------------------------------------
routing_params_file: ''        # parquet — columns: river_id, downstream_river_id, k, x

# ---------------------------------------------------------------------------
# Input data — provide exactly one option
# ---------------------------------------------------------------------------

# Option 1: pre-computed per-catchment volume time series (m^3 per timestep)
lateral_volume_files:          # list, even when only one file is provided
  - ''

# Option 2: gridded runoff depths aggregated via a weight table
# runoff_grid_files:
#   - ''
# grid_weights_file: ''        # required with runoff_grid_files

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
discharge_files:               # one output file per input file, in matching order
  - ''

# ---------------------------------------------------------------------------
# State (optional)
# ---------------------------------------------------------------------------
channel_state_file: ''         # parquet — column: Q (defaults to zero initial conditions)
final_channel_state_file: ''   # parquet written at end of run; omit to skip

# ---------------------------------------------------------------------------
# Compute options (optional — defaults shown)
# ---------------------------------------------------------------------------
input_type: 'sequential'       # "sequential" or "ensemble"
runoff_type: 'incremental'     # "incremental" or "cumulative"
dt_total: 0                    # seconds; defaults to full input duration
dt_routing: 0                  # seconds; defaults to dt_runoff (runoff timestep)
dt_discharge: 0                # seconds; defaults to dt_runoff

# ---------------------------------------------------------------------------
# Logging (optional — defaults shown)
# ---------------------------------------------------------------------------
log: true
progress_bar: true
log_level: 'INFO'              # DEBUG, INFO, WARNING, ERROR, CRITICAL
log_stream: 'stdout'           # "stdout" or a file path
log_format: '%(asctime)s - %(levelname)s - %(message)s'

# ---------------------------------------------------------------------------
# Variable names in input / output files (optional — defaults shown)
# ---------------------------------------------------------------------------
var_river_id: 'river_id'
var_discharge: 'Q'
var_catchment_volume: 'volume'
var_runoff_depth: 'ro'
var_x: 'x'
var_y: 'y'
var_t: 'time'
